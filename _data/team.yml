     description: >
        I'm an Associate Professor in Computing at [Heriot-Watt University Malaysia](https://hw.edu.my){:target="\_blank"} from April 2021.
        Before that, I have been a Senior Lecturer at [Multimedia University](https://www.mmu.edu.my){:target="\_blank"}, where I founded and led the
        [Visual Computing Lab](https://viprlab.github.io){:target="\_blank"}. From 2017-2019, I was also a Visiting Research Fellow at
        [Shanghai Jiao Tong University](https://en.sjtu.edu.cn/){:target="\_blank"} as a recipient of the Belt and Road Initiative Young Scientist Fellowship
        where I collaborated with [Weiyao Lin](https://weiyaolin.github.io/){:target="\_blank"}.
        My research interests span broadly the areas of computer vision and pattern recognition. In particular, my current research focuses on
        several highly subjective tasks -- facial micro-expressions, emotion processing and image aesthetics, as well as a spectrum of
        visual surveillance tasks (object detection, activity recognition).

